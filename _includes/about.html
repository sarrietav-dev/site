{% assign lang = page.lang | default: site.lang | default: 'en' %}
{% assign t = site.data[lang] | default: site.data.en %}

<div class="section">
  <h2 class="label">{{ t.about.label }}</h2>
  <div class="content">
    {% for paragraph in t.about.paragraphs %}
      <p>{{ paragraph }}</p>
    {% endfor %}
  </div>
</div>
