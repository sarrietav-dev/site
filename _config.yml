title: Sebastian Arrieta
email: sarrietav.dev@gmail.com
description: >-
  Software engineer writing about technology and ideas.
url: "https://sarrietav.dev"
lang: en
twitter_username: sarrietav
github_username: sarrietav-dev

permalink: /blog/:slug/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

feed:
  path: /rss.xml

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      lang: en
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      lang: en

sass:
  style: compressed
